server {
    listen 80;
    server_name world.korafc.com;
    return 301 https://$host$request_uri;
}
 
server {
    listen 443 ssl;
    server_name world.korafc.com;
 
    ssl_certificate /etc/letsencrypt/live/world.korafc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/world.korafc.com/privkey.pem;
 
    # Forward API requests to NestJS
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
 
    # Forward everything else to Angular (served by web container nginx)
    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
 