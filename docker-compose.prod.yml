version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kora_world_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kora_network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: kora_world_api
    restart: unless-stopped
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DB_NAME}
      DATABASE_USER: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      - postgres
    networks:
      - kora_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    container_name: kora_world_web
    restart: unless-stopped
    networks:
      - kora_network

  nginx:
    image: nginx:alpine
    container_name: kora_world_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - kora_network

volumes:
  postgres_data:

networks:
  kora_network:
    driver: bridge